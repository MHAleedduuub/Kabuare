<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }
        
        .logo {
            font-size: 60px;
            color: #4CAF50;
            margin-bottom: 20px;
            animation: float 3s infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .title {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        
        .btn-discord {
            background: #5865F2;
            color: white;
        }
        
        .btn-discord:hover {
            background: #4752C4;
            transform: translateY(-2px);
        }
        
        .btn-verify {
            background: #4CAF50;
            color: white;
        }
        
        .btn-verify:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .input-group {
            margin: 20px 0;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus {
            border-color: #4CAF50;
        }
        
        .alert {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            display: none;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .alert-success { background: rgba(76,175,80,0.2); border: 1px solid rgba(76,175,80,0.5); color: #4CAF50; }
        .alert-error { background: rgba(244,67,54,0.2); border: 1px solid rgba(244,67,54,0.5); color: #f44336; }
        .alert-info { background: rgba(33,150,243,0.2); border: 1px solid rgba(33,150,243,0.5); color: #2196F3; }
        
        .hidden { display: none !important; }
        
        .user-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #4CAF50;
        }
        
        .user-info {
            text-align: left;
        }
        
        .user-name {
            color: #fff;
            font-weight: 600;
            font-size: 18px;
        }
        
        .user-status {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-cube"></i>
        </div>
        
        <h1 class="title">Minecraft Verification</h1>
        <p class="subtitle">Link your Minecraft account with Discord</p>

        <div id="alertBox" class="alert"></div>

        <!-- Step 1: Discord Login -->
        <div id="step1">
            <button class="btn btn-discord" onclick="loginWithDiscord()">
                <i class="fab fa-discord"></i> Login with Discord
            </button>
        </div>

        <!-- Step 2: Verification -->
        <div id="step2" class="hidden">
            <div class="user-card">
                <img id="userAvatar" class="user-avatar" src="">
                <div class="user-info">
                    <div id="userName" class="user-name"></div>
                    <div class="user-status">Connected</div>
                </div>
            </div>

            <div class="input-group">
                <input type="text" id="mcUsername" placeholder="Enter your Minecraft username" maxlength="16">
            </div>

            <button class="btn btn-verify" onclick="submitVerification()">
                <i class="fas fa-check-circle"></i> Submit Verification
            </button>

            <button class="btn btn-discord" onclick="logout()" style="background: #ff4757; margin-top: 10px;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <!-- Step 3: Success -->
        <div id="step3" class="hidden">
            <div class="logo">✅</div>
            <h2 style="color: #4CAF50; margin-bottom: 15px;">Request Submitted!</h2>
            <p style="color: rgba(255,255,255,0.7); margin-bottom: 20px;">
                Your verification request has been sent.<br>
                Please wait for an admin to verify you.<br>
                Your nickname will be changed to your Minecraft username.
            </p>
            <button class="btn btn-discord" onclick="logout()">Logout</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
